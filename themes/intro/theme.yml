name: intro
description: Intro theme for the JS.Gripe public entry site, derived from myblog default structure.
style: style.css
script: scripts/consent.js
templates: templates
i18n: i18n.yml
features:
  search: false
  lightbox: false
  media: false
  comments: false
  webMcp: false
featureScripts: {}
featureStyles:
  consent:
    - styles/consent.css
featureCategories: {}
consent:
  enabled: true
  storageKey: js-gripe-consent
  revision: 1
  categories:
    necessary:
      required: true
    preferences:
      required: false
    analytics:
      required: false
    marketing:
      required: false
pageStyles:
  home: styles/home.css
  page: styles/page.css
pageScripts:
  home: []
  page: []
navigation:
  primary:
    - key: projects
      tone: blue
    - key: writing
      tone: violet
    - key: friends
      tone: green
    - key: contact
      tone: red
  secondary:
    - key: about
    - key: privacy
styles: []
scripts:
  head:
    - src: scripts/web-mcp.js
      defer: true
  bodyEnd:
    - src: scripts/site-icons.js
      consent: necessary
      defer: true
icons:
  favicon: /assets/brand/site-icon.png
  icon32: /assets/brand/site-icon.png
  appleTouchIcon: /assets/brand/site-icon.png
pageMascots:
  default: /assets/brand/mascot-sheet.png
  about: /assets/brand/mascot-sheet.png
  projects: /assets/brand/mascot-sheet.png
  writing: /assets/brand/mascot-sheet.png
  privacy: /assets/brand/mascot-sheet.png
  friends: /assets/brand/mascot-friends.png
  contact: /assets/brand/mascot-contact.png
pwa:
  backgroundColor: "#f8f4ec"
  themeColor: "#171514"
nav:
  links:
    - key: home
      href: /:locale/
      label:
        zh-CN: 首页
        zh-TW: 首頁
        en: Home
    - key: about
      href: /:locale/about/
      label:
        zh-CN: 关于
        zh-TW: 關於
        en: About
    - key: projects
      href: /:locale/projects/
      label:
        zh-CN: 项目
        zh-TW: 專案
        en: Projects
    - key: writing
      href: /:locale/writing/
      label:
        zh-CN: 写作
        zh-TW: 寫作
        en: Writing
    - key: friends
      href: /:locale/friends/
      label:
        zh-CN: 友情链接
        zh-TW: 友情連結
        en: Friends
    - key: contact
      href: /:locale/contact/
      label:
        zh-CN: 联系方式
        zh-TW: 聯絡方式
        en: Contact
footer:
  copyright:
    enabled: true
    text:
      zh-CN: "© {year} JS.Gripe"
      zh-TW: "© {year} JS.Gripe"
      en: "© {year} JS.Gripe"
  links:
    - key: about
      href: /:locale/about/
      label:
        zh-CN: 关于
        zh-TW: 關於
        en: About
    - key: privacy
      href: /:locale/privacy/
      label:
        zh-CN: 隐私政策
        zh-TW: 隱私政策
        en: Privacy
    - key: contact
      href: /:locale/contact/
      label:
        zh-CN: 联系方式
        zh-TW: 聯絡方式
        en: Contact
    - key: sitemap
      href: /sitemap.xml
      label:
        zh-CN: 站点地图
        zh-TW: 站點地圖
        en: Sitemap
plugins:
  analytics:
    cloudflareWebAnalytics:
      enabled: true
      src: https://static.cloudflareinsights.com/beacon.min.js
      token: a2c7ad0cfc8f4493aa80c8b5aae99357
      defer: true
      consent: analytics
      beacon:
        spa: false
